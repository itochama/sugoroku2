<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>相馬すごろく〜丁字屋メガネ店を目指して〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16233f;
    --navy-deep:#0b1526;
    --vermilion:#d94a37;
    --gold:#e0b93a;
    --cream:#fff8ea;
    --sea:#3f8fbd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 5%, rgba(224,185,58,0.16), transparent 42%),
      radial-gradient(circle at 90% 85%, rgba(63,143,189,0.2), transparent 48%),
      var(--navy-deep);
    color:var(--cream);
    font-family:"Zen Kaku Gothic New", sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px 12px 40px;
  }
  h1,h2{ font-family:"Shippori Mincho", serif; }
  .app{ width:100%; max-width:760px; }
  header{ text-align:center; margin-bottom:18px; }
  header .eyebrow{ letter-spacing:0.35em; font-size:0.8rem; color:var(--gold); font-weight:900; }
  header h1{
    font-size:clamp(1.9rem, 5.6vw, 3rem);
    margin:8px 0 6px;
    font-weight:800;
    color:#ffffff;
    text-shadow:0 3px 0 var(--vermilion);
  }
  header p{ margin:0; font-size:1rem; color:#f0e6c8; font-weight:500;}
  header .goal-tag{
    display:inline-block; margin-top:10px; padding:8px 20px;
    background:var(--gold); color:var(--navy-deep); font-weight:900;
    border-radius:22px; font-size:1.05rem;
  }
  header::after{
    content:""; display:block; width:140px; height:4px;
    background:linear-gradient(90deg, var(--vermilion), var(--gold));
    margin:16px auto 0; border-radius:2px;
  }

  .setup{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(224,185,58,0.4);
    border-radius:16px; padding:28px 22px; text-align:center;
  }
  .setup h2{ font-size:1.3rem; margin-top:0; color:var(--gold); font-weight:900;}
  .count-row{ display:flex; gap:14px; justify-content:center; margin:18px 0 24px; flex-wrap:wrap; }
  .count-btn{
    width:74px;height:74px;border-radius:50%; border:3px solid var(--gold);
    background:transparent;color:#fff; font-size:1.6rem;font-weight:900;
    font-family:"Shippori Mincho",serif; cursor:pointer; transition:all .15s ease;
  }
  .count-btn:hover{ background:rgba(224,185,58,0.2); }
  .count-btn.selected{ background:var(--gold);color:var(--navy-deep); box-shadow:0 0 0 5px rgba(224,185,58,0.3); }
  .name-row{ display:flex; flex-direction:column; gap:12px; max-width:360px; margin:0 auto 20px; }
  .name-row input{
    padding:12px 14px;border-radius:9px;border:1px solid rgba(255,255,255,0.3);
    background:rgba(255,255,255,0.08);color:#fff;font-family:inherit;font-size:1.05rem;
  }
  .name-row input::placeholder{ color:#b7ae90; }
  .start-btn, .restart-btn{
    background:var(--vermilion); color:#fff; border:none; padding:14px 34px; border-radius:32px;
    font-size:1.15rem; font-weight:900; letter-spacing:0.06em; cursor:pointer;
    font-family:"Zen Kaku Gothic New",sans-serif; box-shadow:0 5px 0 #97281a; transition:transform .1s;
  }
  .start-btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .start-btn:active, .restart-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #97281a; }

  .game{ display:none; gap:14px; flex-direction:column; }

  .map-wrap{
    background:rgba(255,255,255,0.04);
    border:2px solid rgba(224,185,58,0.4);
    border-radius:16px; padding:8px; position:relative;
  }
  .map-inner{
    position:relative; width:100%; aspect-ratio:3/4; max-height:70vh; border-radius:12px; overflow:hidden;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,0.08);
  }
  @media (max-width:480px){
    .map-inner{ aspect-ratio:1/1.15; }
  }
  .map-inner svg{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* --- 名所ピン：フォトタイル風（種類ごとに枠色） --- */
  .pin{
    position:absolute; transform:translate(-50%,-50%);
    width:38px;height:38px;border-radius:9px;
    background:#fffdf6;
    display:flex;align-items:center;justify-content:center;
    border:3px solid #3d5a80;
    box-shadow:0 3px 7px rgba(0,0,0,0.5);
    font-size:18px; z-index:4;
    overflow:hidden;
  }
  .pin .num{
    position:absolute; bottom:-15px; font-size:9px; font-weight:900; color:#fff;
    background:rgba(0,0,0,0.6); border-radius:6px; padding:0 4px; white-space:nowrap;
  }
  .pin .pin-logo-img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .pin.type-normal{ border-color:#3d5a80; }
  .pin.type-sea{ border-color:var(--sea); }
  .pin.type-matsuri{ border-color:var(--vermilion); }
  .pin.type-rest{ border-color:#726a58; }
  .pin.type-bonus{ border-color:var(--gold); }
  .pin.type-start{ border-color:#3f7d3f; width:44px;height:44px; font-size:20px;}
  .pin.type-goal{ border-color:var(--gold); background:linear-gradient(160deg,#fff,#ffe9b8); width:52px;height:52px; font-size:24px; border-width:4px; }
  .pin.current-glow{ box-shadow:0 0 0 5px rgba(255,255,255,0.6), 0 2px 8px rgba(0,0,0,0.6); }

  /* --- コマ（プレイヤートークン）：スマホでも枠内に収まるよう transform で位置調整 --- */
  .token{
    position:absolute; width:62px;height:62px;border-radius:50%;
    display:flex;align-items:center;justify-content:center; font-size:36px;
    border:4px solid var(--navy-deep); transition:left .2s ease, top .2s ease;
    z-index:6; box-shadow:0 5px 10px rgba(0,0,0,0.75);
    transform:translate(-50%,-60%);
    overflow:hidden;
  }
  .token .token-logo-img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  @media (max-width:480px){
    .token{ width:44px;height:44px;font-size:26px;border-width:3px; }
    .pin{ width:30px;height:30px;font-size:14px; }
    .pin.type-start{ width:36px;height:36px;font-size:16px; }
    .pin.type-goal{ width:42px;height:42px;font-size:19px; }
  }

  .event-card{
    background:linear-gradient(135deg, rgba(217,74,55,0.9), rgba(224,185,58,0.45));
    border-radius:14px; padding:14px 18px; text-align:center;
    font-size:clamp(1rem, 2.8vw, 1.3rem); font-weight:900; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.3);
  }

  .dice-row{
    display:flex; align-items:center; justify-content:center; gap:12px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(224,185,58,0.35);
    border-radius:16px; padding:14px 16px; flex-wrap:wrap;
  }
  .dice-row .turn-label{ font-size:1.05rem; color:#fff; font-weight:800; width:100%; text-align:center; margin-bottom:2px; }
  .dice-controls{
    display:flex; align-items:center; justify-content:center; gap:12px;
    width:100%; flex-wrap:nowrap;
  }
  .dice-face{
    width:60px;height:60px; background:var(--cream); border-radius:14px;
    display:flex;align-items:center;justify-content:center; font-size:1.7rem;font-weight:900;color:var(--navy-deep);
    font-family:"Shippori Mincho", serif; box-shadow:0 4px 0 rgba(0,0,0,0.35);
    flex-shrink:0;
  }
  .roll-btn{
    background:var(--gold); color:var(--navy-deep); border:none; padding:14px 22px; border-radius:26px;
    font-weight:900; font-size:1.05rem; cursor:pointer; font-family:"Zen Kaku Gothic New",sans-serif;
    box-shadow:0 4px 0 #a4881d; white-space:nowrap; flex-shrink:0;
  }
  .roll-btn:disabled{ opacity:0.35; cursor:not-allowed; }
  .roll-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #a4881d; }
  @media (max-width:400px){
    .dice-face{ width:50px;height:50px;font-size:1.4rem; }
    .roll-btn{ padding:12px 16px; font-size:0.95rem; }
    .dice-controls{ gap:8px; }
  }

  .legend{ display:flex; flex-wrap:wrap; gap:10px; font-size:0.85rem; color:#f0e6c8; padding:2px 4px; justify-content:center; }
  .legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend .sw{ width:14px;height:14px;border-radius:4px; display:inline-block; }

  .panel{ display:flex; flex-wrap:wrap; gap:16px; align-items:stretch; }
  .players-panel, .log-panel{
    background:rgba(255,255,255,0.05); border:1px solid rgba(224,185,58,0.3);
    border-radius:14px; padding:16px 18px;
  }
  .players-panel{ flex:1 1 240px; }
  .log-panel{ flex:1 1 280px; max-height:150px; overflow-y:auto; }

  .players-panel h3, .log-panel h3{
    margin:0 0 12px; font-size:0.9rem; letter-spacing:0.15em; color:var(--gold); font-weight:900;
  }
  .player-row{
    display:flex; align-items:center; gap:10px; padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,0.1); font-size:1rem; color:#f0e6c8;
  }
  .player-row:last-child{ border-bottom:none; }
  .player-row .dot{ width:16px;height:16px;border-radius:50%; flex-shrink:0; }
  .player-row.active{ color:#fff; font-weight:900; }
  .player-row .pos{ margin-left:auto; color:#c9bf9e; font-size:0.85rem; }

  .log-panel ul{ list-style:none; margin:0; padding:0; font-size:0.9rem; color:#e3d9b8; }
  .log-panel li{ padding:4px 0; border-bottom:1px dashed rgba(255,255,255,0.12); }
  .log-panel li:first-child{ color:#fff; font-weight:700; }

  .win-overlay{
    position:fixed; inset:0; background:rgba(11,21,38,0.94); display:none;
    align-items:center; justify-content:center; z-index:50; flex-direction:column; text-align:center; padding:20px;
  }
  .win-overlay.show{ display:flex; }
  .win-overlay .medal{ font-size:3.4rem; }
  .win-overlay h2{ font-size:2rem; margin:8px 0; color:var(--gold); font-weight:900;}
  .win-overlay p{ color:#f0e6c8; margin-bottom:22px; font-size:1.05rem;}

  footer{ margin-top:26px; font-size:0.8rem; color:#a29b80; text-align:center; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">SOMA CITY MAP BOARD GAME</div>
    <h1>👓 相馬すごろく</h1>
    <p>街なかを出発し、ぐるっと一周してもどってくる地図すごろく</p>
    <div class="goal-tag">🏁 ゴールは「丁字屋メガネ店」（相馬市中村字大町61）</div>
  </header>

  <div class="setup" id="setup">
    <h2>プレイ人数を選んでください</h2>
    <div class="count-row" id="countRow">
      <button class="count-btn" data-count="2">2人</button>
      <button class="count-btn" data-count="3">3人</button>
    </div>
    <div class="name-row" id="nameRow"></div>
    <button class="start-btn" id="startBtn" disabled>すごろくを始める</button>
  </div>

  <div class="game" id="game">
    <div class="map-wrap">
      <div class="map-inner" id="mapInner"></div>
    </div>

    <div class="event-card" id="eventCard">サイコロを振って出発！</div>

    <div class="dice-row">
      <div class="turn-label" id="turnLabel"></div>
      <div class="dice-controls">
        <div class="dice-face" id="diceFace">-</div>
        <button class="roll-btn" id="rollBtn">サイコロを振る</button>
      </div>
    </div>

    <div class="legend">
      <span><span class="sw" style="background:#3f7d3f"></span>スタート</span>
      <span><span class="sw" style="background:#3d5a80"></span>通常</span>
      <span><span class="sw" style="background:#3f8fbd"></span>🌊海：2マス進む</span>
      <span><span class="sw" style="background:#d94a37"></span>🐎野馬追：3マス進む</span>
      <span><span class="sw" style="background:#726a58"></span>😴1回休み</span>
      <span><span class="sw" style="background:#e0b93a"></span>👓ボーナス</span>
      <span><span class="sw" style="background:linear-gradient(135deg,#e0b93a,#d94a37)"></span>🏁ゴール</span>
    </div>

    <div class="panel">
      <div class="players-panel">
        <h3>プレイヤー</h3>
        <div id="playersList"></div>
      </div>
      <div class="log-panel">
        <h3>できごとログ</h3>
        <ul id="logList"></ul>
      </div>
    </div>
  </div>

  <footer>相馬市の名所をモチーフにしたオリジナル創作すごろくです（地図は簡略化したイメージ図です）。</footer>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="medal">🥇</div>
  <h2 id="winText"></h2>
  <p>相馬めぐりお疲れさまでした。丁字屋メガネ店に到着です👓</p>
  <button class="restart-btn" id="restartBtn">もう一度あそぶ</button>
</div>

  let players = [];
  let currentIndex = 0;
  let pinEls = [];
  let tokenEls = [];
  let busy = false;

  const countRow = document.getElementById('countRow');
  const nameRow = document.getElementById('nameRow');
  const startBtn = document.getElementById('startBtn');
  let selectedCount = 0;

  countRow.addEventListener('click', (e)=>{
    const btn = e.target.closest('.count-btn');
    if(!btn) return;
    selectedCount = parseInt(btn.dataset.count, 10);
    [...countRow.children].forEach(b=>b.classList.toggle('selected', b===btn));
    renderNameInputs();
    startBtn.disabled = false;
  });

  function renderNameInputs(){
    nameRow.innerHTML = '';
    for(let i=0;i<selectedCount;i++){
      const input = document.createElement('input');
      input.type = 'text';
      input.maxLength = 8;
      input.placeholder = `プレイヤー${i+1}の名前（省略可）`;
      input.dataset.p = i;
      nameRow.appendChild(input);
    }
  }

  startBtn.addEventListener('click', ()=>{
    if(!selectedCount) return;
    players = [];
    const inputs = nameRow.querySelectorAll('input');
    for(let i=0;i<selectedCount;i++){
      const name = (inputs[i] && inputs[i].value.trim()) || `プレイヤー${i+1}`;
      players.push({id:i, name, color:PLAYER_COLORS[i], pos:0, skip:false, items:0});
    }
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    buildMap();
    renderPlayers();
    positionTokens();
    currentIndex = 0;
    // 前回のゲーム終了時に固定された状態（ボタン無効化・サイコロ表示）をリセット
    busy = false;
    rollBtn.disabled = false;
    diceFace.textContent = '-';
    updateTurnUI();
    log(`${players.map(p=>p.name).join('・')} ですごろく開始！`);
  });

  const mapInner = document.getElementById('mapInner');
  function buildMap(){
    mapInner.innerHTML = '';
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox","0 0 100 100");
    svg.setAttribute("preserveAspectRatio","none");

    function addShape(tag, attrs){
      const el = document.createElementNS(svgNS, tag);
      Object.keys(attrs).forEach(k=>el.setAttribute(k, attrs[k]));
      svg.appendChild(el);
      return el;
    }

    // --- 落ち着いた色調の、現実に近い簡略地図 ---
    addShape("rect",{x:0,y:0,width:100,height:100,fill:"#eae4cd"});

    addShape("path",{d:"M0,0 L36,0 C30,8 26,10 20,16 C14,22 8,20 4,26 C0,30 0,26 0,20 Z", fill:"#b7c894", opacity:"0.85"});
    addShape("path",{d:"M0,0 L20,0 C14,6 10,10 6,16 C2,20 0,18 0,14 Z", fill:"#9db47a", opacity:"0.8"});
    for(let i=0;i<26;i++){
      const fx = 2 + Math.random()*26;
      const fy = 1 + Math.random()*20;
      addShape("circle",{cx:fx.toFixed(1), cy:fy.toFixed(1), r:"0.5", fill:"#5f7a46", opacity:"0.5"});
    }

    addShape("rect",{x:6,y:36,width:24,height:16,rx:2,fill:"#dfe0a8", opacity:"0.6"});
    addShape("rect",{x:32,y:6,width:18,height:10,rx:2,fill:"#dfe0a8", opacity:"0.55"});
    addShape("rect",{x:34,y:66,width:16,height:10,rx:2,fill:"#dfe0a8", opacity:"0.5"});

    addShape("path",{d:"M20,0 C25,10 15,18 21,28 C26,36 16,46 22,56 C26,64 18,72 24,100", stroke:"#5c93b0", "stroke-width":"0.8", fill:"none", opacity:"0.55"});

    addShape("path",{d:"M33,0 C34,20 30,40 31,58 C31,72 34,86 34,100", stroke:"#5a5142", "stroke-width":"0.6", fill:"none", opacity:"0.6"});
    addShape("path",{d:"M27,0 C28,20 25,40 26,58 C26,72 28,86 28,100", stroke:"#8a8272", "stroke-width":"0.45", fill:"none", "stroke-dasharray":"1.2,1", opacity:"0.6"});

    (function(){
      const gx=18, gy=48, gw=22, gh=16;
      addShape("rect",{x:gx,y:gy,width:gw,height:gh,fill:"#efe9d6", opacity:"0.9"});
      for(let i=0;i<=4;i++){
        addShape("line",{x1:gx+i*(gw/4), y1:gy, x2:gx+i*(gw/4), y2:gy+gh, stroke:"#c9c0a0", "stroke-width":"0.25"});
      }
      for(let j=0;j<=3;j++){
        addShape("line",{x1:gx, y1:gy+j*(gh/3), x2:gx+gw, y2:gy+j*(gh/3), stroke:"#c9c0a0", "stroke-width":"0.25"});
      }
    })();

    addShape("path",{d:"M66,22 C78,20 88,26 86,36 C84,44 90,46 88,54 C86,62 76,64 70,58 C64,52 62,44 64,36 C65,30 62,24 66,22 Z", fill:"#7fb2cf", opacity:"0.92"});
    addShape("ellipse",{cx:78, cy:46, rx:2.2, ry:1.4, fill:"#c8c19a", stroke:"#8a8272", "stroke-width":"0.3"});

    addShape("path",{d:"M86,14 C93,18 94,34 92,46 C91,54 94,60 91,68 C88,72 82,58 84,44 C85,34 82,20 86,14 Z", fill:"#eae4cd", opacity:"0.95"});

    addShape("rect",{x:92,y:0,width:8,height:100,fill:"#3f8fbd"});
    addShape("path",{d:"M58,0 L100,0 L100,10 C88,8 76,6 58,8 Z", fill:"#3f8fbd", opacity:"0.9"});
    [10,30,50,70,90].forEach(wy=>{
      addShape("path",{d:`M94,${wy} q2,-1.4 4,0`, stroke:"#eaf6ff", "stroke-width":"0.35", fill:"none", opacity:"0.6"});
    });

    mapInner.appendChild(svg);

    const roadSvg = document.createElementNS(svgNS,"svg");
    roadSvg.setAttribute("viewBox","0 0 100 100");
    roadSvg.setAttribute("preserveAspectRatio","none");
    roadSvg.style.position="absolute"; roadSvg.style.inset="0";
    const poly = document.createElementNS(svgNS,"polyline");
    poly.setAttribute("points", squares.map(s=>`${s.x},${s.y}`).join(" "));
    poly.setAttribute("fill","none");
    poly.setAttribute("stroke","#6b4a2b");
    poly.setAttribute("stroke-width","0.7");
    poly.setAttribute("stroke-dasharray","1.8,1.4");
    poly.setAttribute("stroke-linecap","round");
    poly.setAttribute("opacity","0.85");
    roadSvg.appendChild(poly);
    mapInner.appendChild(roadSvg);

    pinEls = [];
    squares.forEach((sq, i)=>{
      const pin = document.createElement('div');
      pin.className = `pin type-${sq.type}`;
      pin.style.left = sq.x + '%';
      pin.style.top = sq.y + '%';
      if(sq.type === 'start'){
        pin.innerHTML = `<img class="pin-logo-img" src="${LOGO_SRC}" alt="丁字屋"><span class="num">S</span>`;
      } else if(sq.type === 'goal'){
        pin.innerHTML = `<img class="pin-logo-img" src="${GOAL_LOGO_SRC}" alt="丁字屋"><span class="num">G</span>`;
      } else {
        pin.innerHTML = `${sq.icon}<span class="num">${i}</span>`;
      }
      mapInner.appendChild(pin);
      pinEls.push(pin);
    });

    tokenEls.forEach(t=>t.remove());
    tokenEls = [];
    players.forEach((p,i)=>{
      const tok = document.createElement('div');
      tok.className = 'token';
      tok.style.background = p.color;
      tok.textContent = PLAYER_ICONS[i];
      mapInner.appendChild(tok);
      tokenEls.push(tok);
    });
  }

  function positionTokens(){
    players.forEach((p,i)=>{
      const sq = squares[p.pos];
      const tok = tokenEls[i];
      const offsetX = (i - (players.length-1)/2) * 5;
      // %指定＋CSSのtransformで中心を合わせるので、画面サイズが変わっても端で見切れない
      tok.style.left = `${sq.x + offsetX}%`;
      tok.style.top = `${sq.y}%`;
    });
  }
  window.addEventListener('resize', ()=>{ if(players.length) positionTokens(); });

  function renderPlayers(){
    const list = document.getElementById('playersList');
    list.innerHTML = '';
    players.forEach((p,i)=>{
      const row = document.createElement('div');
      row.className = 'player-row' + (i===currentIndex ? ' active' : '');
      row.innerHTML = `<span class="dot" style="background:${p.color}"></span>${p.name}<span class="pos">${p.pos===squares.length-1?'ゴール':'マス'+p.pos}${p.items?' ・ 👓x'+p.items:''}</span>`;
      list.appendChild(row);
    });
  }

  function updateTurnUI(){
    renderPlayers();
    document.getElementById('turnLabel').textContent = `${players[currentIndex].name} の番です`;
    pinEls.forEach(p=>p.classList.remove('current-glow'));
    pinEls[players[currentIndex].pos].classList.add('current-glow');
  }

  function setEventCard(text){
    document.getElementById('eventCard').textContent = text;
  }

  function log(msg){
    const list = document.getElementById('logList');
    const li = document.createElement('li');
    li.textContent = msg;
    list.insertBefore(li, list.firstChild);
  }

  const rollBtn = document.getElementById('rollBtn');
  const diceFace = document.getElementById('diceFace');

  rollBtn.addEventListener('click', ()=>{
    if(busy) return;
    busy = true;
    rollBtn.disabled = true;
    let ticks = 0;
    const spin = setInterval(()=>{
      diceFace.textContent = 1 + Math.floor(Math.random()*6);
      ticks++;
      if(ticks > 8){
        clearInterval(spin);
        const value = 1 + Math.floor(Math.random()*6);
        diceFace.textContent = value;
        log(`${players[currentIndex].name} は ${value} を出した`);
        movePlayer(players[currentIndex], value, onMainMoveDone);
      }
    }, 70);
  });

  function movePlayer(player, steps, done){
    const goal = squares.length - 1;
    const stepOnce = ()=>{
      if(steps <= 0 || player.pos >= goal){
        done(player);
        return;
      }
      player.pos = Math.min(player.pos + 1, goal);
      steps--;
      positionTokens();
      renderPlayers();
      setTimeout(stepOnce, 170);
    };
    stepOnce();
  }

  function onMainMoveDone(player){ handleLanding(player); }

  function handleLanding(player){
    const goal = squares.length - 1;
    if(player.pos >= goal){ finishGame(player); return; }
    const sq = squares[player.pos];
    setEventCard(`${player.name}：${sq.icon} ${sq.t}`);
    if(sq.type === 'sea'){
      log(`${player.name}：${sq.t}`);
      setTimeout(()=> movePlayer(player, 2, afterBonus), 400);
    } else if(sq.type === 'matsuri'){
      log(`${player.name}：${sq.t}`);
      setTimeout(()=> movePlayer(player, 3, afterBonus), 400);
    } else if(sq.type === 'rest'){
      log(`${player.name}：${sq.t}`);
      player.skip = true;
      endTurn();
    } else if(sq.type === 'bonus'){
      player.items++;
      log(`${player.name}：${sq.t}`);
      endTurn();
    } else {
      log(`${player.name}：${sq.t}`);
      endTurn();
    }
  }

  function afterBonus(player){
    const goal = squares.length - 1;
    if(player.pos >= goal){ finishGame(player); } else { endTurn(); }
  }

  function endTurn(){
    renderPlayers();
    currentIndex = (currentIndex + 1) % players.length;
    checkSkipAndContinue();
  }

  function checkSkipAndContinue(){
    const p = players[currentIndex];
    if(p.skip){
      p.skip = false;
      updateTurnUI();
      setEventCard(`${p.name} は 😴 1回休みです`);
      log(`${p.name} はお休み中…次の番へ`);
      setTimeout(()=>{
        currentIndex = (currentIndex + 1) % players.length;
        checkSkipAndContinue();
      }, 1000);
    } else {
      updateTurnUI();
      busy = false;
      rollBtn.disabled = false;
    }
  }

  function finishGame(player){
    log(`${player.name} がゴール！丁字屋メガネ店に到着🎉`);
    setEventCard(`🏁 ${player.name} が丁字屋メガネ店に到着！`);
    renderPlayers();
    document.getElementById('winText').textContent = `${player.name} の勝ち！`;
    document.getElementById('winOverlay').classList.add('show');
    busy = true;
    rollBtn.disabled = true;
  }

  document.getElementById('restartBtn').addEventListener('click', ()=>{
    document.getElementById('winOverlay').classList.remove('show');
    document.getElementById('game').style.display = 'none';
    document.getElementById('setup').style.display = 'block';
    document.getElementById('logList').innerHTML = '';
    setEventCard('サイコロを振って出発！');
    selectedCount = 0;
    [...countRow.children].forEach(b=>b.classList.remove('selected'));
    nameRow.innerHTML = '';
    startBtn.disabled = true;
  });

})();
</script>
</body>
</html>
